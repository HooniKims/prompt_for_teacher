[build]
  command = "npm run check"
  publish = "webapp"

[[redirects]]
  from = "/openai/v1/*"
  to = "/.netlify/functions/openai/v1/:splat"
  status = 200

[[redirects]]
  from = "/v1/*"
  to = "/.netlify/functions/local-llm/v1/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
